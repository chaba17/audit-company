  <!-- CookieHub: deferred until first user interaction or 3s idle -->
  <script>
    (function () {
      var loaded = false;
      function loadCookieHub() {
        if (loaded) return;
        loaded = true;
        var s = document.createElement('script');
        s.src = 'https://cdn.cookiehub.eu/c2/dc075307.js';
        s.async = true;
        s.onload = function () { if (window.cookiehub) window.cookiehub.load({}); };
        document.head.appendChild(s);
      }
      var events = ['mousemove', 'scroll', 'touchstart', 'keydown', 'click'];
      var opts = { once: true, passive: true, capture: true };
      events.forEach(function (e) { window.addEventListener(e, loadCookieHub, opts); });
      setTimeout(loadCookieHub, 3000);
    })();
  </script>

<style>
:root{--color-ink:#2E2E38;--color-yellow:#FFE600;--color-yellow-dark:#E6CF00;--color-gray-700:#4B4B55;--font-display:"Archivo","Noto Sans Georgian",-apple-system,sans-serif;--font-sans:"Inter","Noto Sans Georgian",-apple-system,sans-serif}
*{box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--font-sans);color:var(--color-ink);background:#fff;line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.container{max-width:1280px;margin:0 auto;padding:0 28px}
.container-wide{max-width:100%;margin:0 auto;padding:0 40px}
.header{position:sticky;top:0;z-index:100;background:var(--color-ink);color:#fff}
.nav{display:flex;align-items:stretch;min-height:64px}
.logo{display:flex;align-items:center;padding:0 18px;flex-shrink:0;gap:10px;text-decoration:none}
.logo-img{display:block;height:100%;max-height:60px;width:auto;max-width:220px;object-fit:contain}
.logo-ey{font-family:var(--font-display);font-weight:800;font-size:20px;color:#fff;letter-spacing:-0.02em;line-height:1;display:block;white-space:nowrap}
.nav-menu{display:none}
.nav-actions{margin-left:auto;display:flex;align-items:stretch}
.hero{position:relative;overflow:hidden;background:var(--color-ink);color:#fff;min-height:75vh;display:flex;align-items:center}
.hero-bg{position:absolute;inset:0;z-index:0;opacity:0.45}
.hero-bg img{width:100%;height:100%;object-fit:cover;display:block}
.hero-beam{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(46,46,56,0.35),rgba(46,46,56,0.85))}
.hero-content{position:relative;z-index:2;max-width:720px;padding:80px 0}
.hero-tag{display:inline-block;padding:6px 14px;border:1px solid var(--color-yellow);color:var(--color-yellow);font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:28px;border-radius:2px}
.hero h1{font-family:var(--font-display);font-size:clamp(36px,6vw,72px);line-height:1.05;font-weight:800;margin:0 0 24px;letter-spacing:-0.02em;color:#fff}
.hero-sub{font-size:clamp(15px,1.4vw,18px);line-height:1.6;color:rgba(255,255,255,0.82);margin:0 0 36px;max-width:600px}
.hero-actions{display:flex;gap:16px;flex-wrap:wrap}
.highlight{color:var(--color-yellow);font-style:normal;white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:10px;padding:14px 24px;font-weight:700;font-size:14px;text-decoration:none;border:none;cursor:pointer;transition:all 0.25s;border-radius:2px}
.btn-lg{padding:18px 32px;font-size:16px}
.btn-yellow{background:var(--color-yellow);color:var(--color-ink)}
.btn-outline-light{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,0.35)}
.reveal{opacity:0;transform:translateY(20px);transition:opacity 0.6s,transform 0.6s}
.reveal.visible{opacity:1;transform:none}
.nav-toggle{display:none;background:none;border:0;color:#fff;padding:0 16px;cursor:pointer}
@media(max-width:1100px){.nav{min-height:60px}.logo{padding:0 16px}.nav-toggle{display:inline-flex;align-items:center;min-height:60px;width:46px}.nav-menu{display:none}}
@media(max-width:768px){.nav{min-height:56px}.logo{padding:0 12px}.nav-toggle{min-height:56px}.hero-content{padding:60px 0}.hero{min-height:65vh}}
</style>
