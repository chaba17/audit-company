<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>404 — Not Found</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #14141C; color: #9898A3; display: grid; place-items: center; min-height: 100vh; }
    .box { text-align: center; padding: 40px; }
    h1 { font-size: 96px; margin: 0; font-weight: 200; letter-spacing: -2px; color: #FFE600; }
    p { margin: 8px 0; font-size: 14px; }
    a { color: #FFE600; text-decoration: none; margin-top: 20px; display: inline-block; }
  </style>
  <script>
    // Immediately redirect to homepage - the old /admin URL no longer exists
    setTimeout(function(){ location.replace('/'); }, 1500);
  </script>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>This page does not exist.</p>
    <a href="/">Go to homepage</a>
  </div>
</body>
</html>
